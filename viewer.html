<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@latest/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@latest/examples/jsm/"
      }
    }
    </script>

    <style>
        body {
            font-family: Verdana, sans-serif;
            margin: 0; 
            overflow: hidden;
            color: #fafafa;
            background-color: #d3d3d3;
        }

        .box {
            position: absolute;
            background-color: rgba(36, 36, 36, 0.8);
            color: #fff;
            padding: 10px 20px;
            font-size: 20px;
            border-radius: 0px;
            box-shadow: rgba(30, 30, 30, 0.06) 0px 0px 4px 4px;
        }
        
        .box-load {
            position: absolute;
            background-color: #ddd;
            color: #000;
            padding: 10px 20px;
            font-size: 20px;
            border-radius: 4px;
        }

        #watermark {
            position: absolute;
            display: none;
            background-color: rgba(36, 36, 36, 0.8);
            color: #fff;
            bottom: 0px;
            right: 0px;
            padding: 6px 16px;
        }
        
        #watermark img {
            width: 20px;
            height: 20px;
            border-radius: 15px;
            border: 1px solid #000;
            filter: invert(100%);
        }

        #loading {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
        }

        #stats {
            top: 0;
            left: 0;
            display: none;
        }

        #username {
            top: 50px;
        }
        
        #date-v2 {
            top: 100px;
        }

        #username, #date-v2 {
            left: 0;
            display: none;
            font-size: 15px;
            padding: 5px 15px;
        }
        
        #username img {
            width: 20px;
            height: 20px;
            border-radius: 6px;
        }

        button {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease-in-out;
            background-color: #87ceeb;
            padding: 6px 16px;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        #retry {
            display: none;
        }

        #viewer {
            background-color: #333;
        }

        a {
            color: #fff;
        }
        
        a:visited:hover {
            color: #fff;
        }
        
        a:visited {
            color: #fff;
        }
        
        a:hover {
            color: #fff;
        }

        #web-settings {
            top: 0px;
            right: 0px;
            border-radius: 3px;
        }

        #web-settings:hover {
            background-color: #87ceeb;
            color: #000;
            cursor: pointer;
        }

        #web-settings-dropdown {
            display: none;
            right: 0px;
            top: 50px;
            border-radius: 3px;
        }

        #web-settings-dropdown div {
            position: relative;
            border-radius: 3px;
            padding: 2px 2px 2px 2px;
        }

        #web-settings-dropdown div:hover {
            background-color: #87ceeb;
            color: #000;
            cursor: pointer;
        }
    </style>
</head>
<body>

        	debug:"false",
         	player_redesign_trans:"true",
            player_redesign: "true",
            webgl: {
                warn_unsupported: "true",
            	lighting: {
             		use_hdri: "true",
                	erm: "false",
               	}
           },
           model: {
               allow_legacy_model: "true",
               smooth_normals: "true",
   			   _lines: {
                   ldraw: "false",
                   custom: "false"
               }
		   }
        };
                
        window.globalPlayerConfig ??= {};
        
        console.log("[VIEWER] before merge", window.globalPlayerConfig);
        
        for (const [key, value] of Object.entries(default_player_config)) {
          if (!(key in window.globalPlayerConfig)) {
            window.globalPlayerConfig[key] = value;
          }
        }
                
        console.log("[VIEWER] after merge", window.globalPlayerConfig);
                
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById('retry').onclick = function() {
                window.location.reload();
            }
            
        	const version_string = "Gr8brik Viewer 01-28-26";
       		const version_num = "012820261-1327";
            window.modelIsLegacy = false;
                    
            console.log(window.globalPlayerConfig);
            
            let debug = false;
            if(window.globalPlayerConfig.debug === "true") {
           		debug = true;
            }

            if(debug) {
                console.log(JSON.stringify(window.globalPlayerConfig));
            }
                
          	if(typeof window.globalPlayerConfig.player_redesign === "boolean" && debug) {
            	console.log('Player redesign flags coming soon');
            }

            const viewer = document.getElementById("viewer");
            const loading = document.getElementById("loading");
            const wmark = document.getElementById("watermark");

            const model_file = new URLSearchParams(window.location.search).get("model");

            const stat_date = document.getElementById("date-v2");
            const stat_username = document.getElementById("username");
            const stat_name = document.getElementById("stats");

            if (!model_file) {
                console.error("invalid creation file");
                loading.innerText = "Creation not found";
                return;
            }

            fetch(`/ajax/build?buildId=${model_file}&fetch=1`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Server returned the error code ${response.status}`);
                        console.error(response);
                    }
                    return response.text();
                })
                .then(text => {
                    try {
                        window.creation_data = text;
                        return JSON.parse(creation_data);
                    } catch (error) {
                        console.error(response);
                    }
                })
                .then(creation_data => {
                    if(creation_data.legacy == 1) {
                        window.location=`/legacy_viewer.html?model=${model_file}`;
                    }

                    fetch(`${creation_data.model}`)
                        .then(response => {
                            if (!response.ok) {
								console.error(response);
                            }
                            return response.text();
                        })
                        .then(text => {
                            try {
                                const model_data = JSON.parse(text);
                                load_model_data(model_data);
                            } catch (error) {
                                alert(error);
                                console.error(error);
                            }
                        })
                })

                .catch(error => {
                    console.error(error);
                    loading.innerText = `An error occurred: ${error.message}`;
                    document.getElementById("retry").style.display = "block";
                });

                function load_model_data(model_data) {
                    var scene = new THREE.Scene();

                    var renderer = new THREE.WebGLRenderer({canvas: viewer, antialias: true, alpha: true});
                    renderer.setSize(window.innerWidth, window.innerHeight);

                    var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
                    
                    if(model_data.camera) {
                        camera.position.set(model_data.camera.x, model_data.camera.y, model_data.camera.z);
                    } else {
                        camera.position.set(250, 250, 250);
                    }

                    var ambient = new THREE.AmbientLight(0xffffff);
                    scene.add(ambient);
                    
                    var directional = new THREE.DirectionalLight(0xffffff, 2.5);
                    directional.position.set(camera.position.x, camera.position.y, camera.position.z);
                    scene.add(directional);
                    
                    var directional2 = new THREE.DirectionalLight(0xffffff, 2.5);
                    directional2.position.set(camera.position.x - camera.position.x * 2, camera.position.y - camera.position.y * 2, camera.position.z - camera.position.z * 2);
                    scene.add(directional2);
                    
                    if(debug === true) {
                            console.log(camera.position.x - camera.position.x * 2, camera.position.y - camera.position.y * 2, camera.position.z - camera.position.z * 2);
                    		console.log(camera.position.x, camera.position.y, camera.position.z);
                    }
                    
                    var controls = new OrbitControls(camera, renderer.domElement);

                    var loader = new LDrawLoader();
                    var ldr_path = "https://raw.githubusercontent.com/susstevedev/gr8brik-ldraw-fork/refs/heads/main/ldraw-parts/";

                    loader.preloadMaterials(ldr_path + 'colors/ldconfig.ldr');
                    loader.setConditionalLineMaterial(LDrawConditionalLineMaterial);
                    loader.setPartsLibraryPath(ldr_path + 'actual/');
                    loader.setPath(ldr_path + 'actual/parts/');

                            if(window.globalPlayerConfig.webgl.lighting.erm === "true") {

                            }

                    	});

                        const normalizedHex = String(partColor).toUpperCase().trim();
                        const materialType = colormap.get(normalizedHex) || 'solid';

                        const params = {
                            color: new THREE.Color(normalizedHex),
                            reflectivity: 0.5,
                            roughness: 0.15,
                            metalness: 0.0,
                            clearcoat: 0.4,
                            envMapIntensity: 0.5,
                            clearcoatRoughness: 0.1
                        };

                        switch (materialType) {
                            case 'transparent':
                                params.transparent = true;
                                params.opacity = 0.6;
                                params.roughness = 0.02;
                                params.transmission = 0.75;
                                params.ior = 1.55;
                                break;

                            case 'chrome':
                                params.roughness = 0.0;
                                params.metalness = 1.0;
                                params.clearcoat = 0.0;
                                break;

                            case 'metallic':
                                params.roughness = 0.25;
                                params.metalness = 0.75;

                                break;

                            case 'speckle':
                                params.roughness = 0.5;
                                params.clearcoat = 0.2;

                    let total = 0

                    }
                    window.file_ver = model_data.metadata.file_version;
                    console.log(window.file_ver);
                    
                    var complete = false;
                    var partsIntersecting = [];

                    function loadParts(blocks, index = 0) {
                        if (index === blocks.length) {
                            showViewer();
                            return;
                        }
                        
                        const block = blocks[index];

                        if (!block.ldraw) {
                            if(debug === true) {
                            	console.warn("skipping invalid part " + block);
                            }
                            loadParts(blocks, index + 1);
                            return;
                        }

                        //try {
                            loader.load(`${block.ldraw}`, function (group) {
                                group.traverse((child) => {
                                    if (window.globalPlayerConfig.model._lines.ldraw === "false" && child.isLineSegments && child.userData.ldr_line != true) {
                                        child.visible = false;
                                        return;
                                    }
                                    
                                    let colorHex;
                                    if(window.file_ver <= "1.2") {
                                        colorHex = "#" + block.color;
                                    } else {
                                        colorHex = block?.materials;
                                    }

                                    //let colorHex = `${block.color ? block.color.replace(/^#/, '') : 'ffffff'}`;
                                    //let colorHex = `${mats ? mats.replace(/^#/, '') : 'ffffff'}`

                                    if(!child.isLineSegments) {
                                        if(!Array.isArray(colorHex)) {
                                            let custommaterial = createCustomMaterial(colorHex);
                                            if(custommaterial && scene?.userData?.highRes === true) {
                                                child.material = custommaterial;
                                            } else {
                                                child.material = new THREE.MeshPhysicalMaterial({
                                                    color: new THREE.Color(colorHex || "#ffffff")
                                                });
                                            }
                                        } else if(Array.isArray(colorHex)) {
                                            if(colorHex.length < 2) {
                                                let color = "#" + colorHex[0]?.color || "#ffffff";
                                                let custommaterial = createCustomMaterial(color);
                                                if(custommaterial && scene?.userData?.highRes === true) {
                                                    child.material = custommaterial;
                                                } else {
                                                    child.material = new THREE.MeshPhysicalMaterial({
                                                        color: new THREE.Color(color)
                                                    });
                                                }
                                            }
                                        }
                                    }

                                    if (child.isMesh && !Array.isArray(child.material)) {
                                        const edges = new THREE.EdgesGeometry(child.geometry, 10);
                                        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                                        line.userData.ldr_line = true;

                                        if(window.globalPlayerConfig.model._lines.custom === "false") {
                                            line.visible = false;
                                        }

                                        child.add(line);
                                    }
                                    
                                    if (child.isMesh && Array.isArray(child.material)) {
                                        child.material.forEach((mat) => {
                                           console.log(mat.name);
                                            
                                            if(mat.name.includes("Main_Colour")) {
                                                var index = child.material.map(function (mmap) { return mmap.uuid; }).indexOf(mat.uuid);

                                                child.material[index] = mat.clone();
                                                child.material[index].needsUpdate = true;

                                                mat.name = child.material[index].name + '_' + child.uuid;

                                                child.userData.main_mat_uuid = mat.uuid;
                                                child.userData.main_mat_name = mat.name;

                                                child.userData.main_mat_index = index;
                                                console.log(index);

                                                if(colorHex) {
                                                    if(Array.isArray(colorHex)) {
                                                        let match = colorHex.find(m => m.id === index);

                                                        if(match?.color) {
                                                            child.material[index].color = new THREE.Color("#" + match.color);
                                                        } else {
                                                            child.material[index].color = new THREE.Color("#ffffff");
                                                        }
                                                    } else {
                                                        child.material[index].color = new THREE.Color(colorHex || "#ffffff");
                                                    }
                                                }
                                            } else {
                                                var index = child.material.map(function (mmap) { return mmap.uuid; }).indexOf(mat.uuid);
                                                child.material[index] = mat.clone();
                                                child.material[index].name = child.material[index].name + '_' + child.uuid;
                                                child.material[index].needsUpdate = true;
                                            }
                                        });
                                    }

                                    console.log(child.userData);
                                    console.log(child.children);
                                    if(child.isMesh && child.userData.fileName) {
                                    	let childBB = new THREE.Box3().setFromObject(child);
                                        childBB.cloneid = child.id;
                                    	partsIntersecting.push(childBB);
                                    }
                                });

                                if(block?.matrixw) {
                                    if(block.matrixw?.elements) {
                                        let matrix = new THREE.Matrix4().fromArray(block.matrixw.elements);
                                        group.matrixAutoUpdate = true;
                                        matrix.decompose(group.position,group.quaternion,group.scale);
                                        group.updateMatrix();
                                        group.updateMatrixWorld(true);
                                    } else {
                                        group.position.set(block.position.x, block.position.y, block.position.z);
                                        group.rotation.set(block.rotation.x, block.rotation.y, block.rotation.z);
                                    }
                                } else {
                                    group.position.set(block.position.x, block.position.y, block.position.z);
                                    group.rotation.set(block.rotation.x, block.rotation.y, block.rotation.z);
                                }

                                scene.add(group);

                                loadParts(blocks, index + 1);
                            //});
                       	}, undefined, function (error) {
                                console.warn(`Failed to load block ${block.ldraw} ` + error);
                                console.log(block.ldraw);

                            	if(debug === true) {
                                    for (const key in error) {
                                        console.error(`Error property '${key}':` + error[key]);
                                    }
                                    if (error.stack) {
                                        console.error("Error stack:", error.stack);
                                    }
                                    if (error instanceof DOMException) {
                                        console.error("DOMException name:" + error.name);
                                        console.error("DOMException code:" + error.code);
                                    }
                                }

                                loadParts(blocks, index + 1);
                        });
                    }

                    if(!window.globalPlayerConfig.model.allow_legacy_model === "true") {
                    	loadParts(model_data.blocks);
                    } else {
                        if(model_data[0]?.intersect?.object?.metadata?.generator && model_data[0]?.intersect?.object?.metadata?.generator == "Object3D.toJSON") {
                            let message = 'Legacy Gr8brik models are not compatible with this version of the viewer';
                            loading.innerText = `An error occurred: ${message}`;
                            document.getElementById("retry").style.display = "block";
                            throw new Error(message);
                        } else {
                            loadParts(model_data.blocks);
                        }
                    }

                    function showViewer() {
                        document.title = `${JSON.parse(window.creation_data).name} | gr8brik.rf.gd`;
                        
                        loading.style.display = "none";
                        viewer.style.display = "block";

                        wmark.style.display = "block";
                        wmark.innerHTML = "<img src='/img/logo/simplev2.png' alt='Logo' title='Logo' /> gr8brik.rf.gd";

                        stat_name.style.display = "block";
                        stat_name.innerHTML += `<a href="/build/${JSON.parse(window.creation_data).modelid}" target="_blank">${JSON.parse(window.creation_data).name}</a>`;

                        stat_username.style.display = "block";
                        stat_username.innerHTML += `<a href="/user/${JSON.parse(window.creation_data).userid}" target="_blank"><img src='/acc/users/pfps/${JSON.parse(window.creation_data).userid}.webp' alt='User icon' title='User icon' />${JSON.parse(window.creation_data).username}</a>`;
                        
                        stat_date.style.display = "block";
                        stat_date.innerHTML += `${JSON.parse(window.creation_data).date}`;

                        animate();
                    }
                    
                    window.showViewer = showViewer;
                    
                    window.intersectingCheck = function() { 
                        console.log(partsIntersecting);
                        scene.traverse((obj) => {
                          const others = partsIntersecting.filter(other => other !== obj)

                          others.forEach(other => {
                            if (obj.intersectsBox(other)) {
                                let OGobj = scene.getObjectById(obj.cloneid);
                                if(debug === true) {
                                	console.log(OGobj + ' is inside another part');
                                }
                                
                                OGobj.material.transparent = true;
                                OGobj.material.opacity = 0.25;
                                OGobj.material.needsUpdate = true;
                                
                                scene.updateMatrixWorld(true);
                                OGobj.updateMatrixWorld(true);
                            }
                          });
                        });
                    }

                    document.getElementById('web-settings').addEventListener('click', function() {
                        let settings = document.getElementById('web-settings-dropdown');
                        if(settings.style.display == 'none') {
                            settings.style.display = 'block';
                        } else {
                            settings.style.display = 'none';
                        }
                    });

                    // show ldrawloader lines
                    document.getElementById('show-lines').addEventListener('click', () => {
                        const show = window.globalPlayerConfig.model._lines.ldraw === "false";

                        scene.traverse((o) => {
                            if (o.isLineSegments) {
                                o.visible = show;
                            }
                        });

                        window.globalPlayerConfig.model._lines.ldraw = show ? "true" : "false";
                    });
                    
                    window.addEventListener('resize', onWinResize, true);
                    
                    function onWinResize() {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                    }

                    function animate() {
                        requestAnimationFrame(animate);

                        if (controls) {
                            controls.update();
                        }

                        renderer.render(scene, camera);
                    }
                    animate();
                }
            
			if(window.globalPlayerConfig.player_redesign_trans === "false") {
                let elements = document.querySelectorAll('.box');
                
                elements.forEach(e => {
                	e.classList.add("box-load");
                	e.classList.remove("box");
                });
			}
        });
    </script>
    <div id="loading" class="box-load">Loading...</div>
    <button id="retry">Retry</button>
    <div id="stats" class="box"></div>
    <div id="username" class="box">By </div>
    <div id="date-v2" class="box">Created </div>
    <div id="web-settings" class="box right">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-sliders2" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M10.5 1a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V4H1.5a.5.5 0 0 1 0-1H10V1.5a.5.5 0 0 1 .5-.5M12 3.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5m-6.5 2A.5.5 0 0 1 6 6v1.5h8.5a.5.5 0 0 1 0 1H6V10a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5M1 8a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2A.5.5 0 0 1 1 8m9.5 2a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V13H1.5a.5.5 0 0 1 0-1H10v-1.5a.5.5 0 0 1 .5-.5m1.5 2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"/>
        </svg>
    </div>
    <div id="web-settings-dropdown" class="box">
        <div>
            <span id="show-lines">Enable/disable lines</span>
        </div>
    </div>
    <div id="watermark"></div>
    <canvas id="viewer" style="width: 100vw; height: 100vh; display: none;"></canvas>
</body>
</html>
